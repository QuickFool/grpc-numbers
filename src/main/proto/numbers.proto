syntax = "proto3";

option java_package = "com.example";
option java_multiple_files = true;

message NumbersRequest {
  int32 firstValue = 1;
  int32 lastValue = 2;
}

message NumberResponse {
  int32 value = 1;
}

service NumbersService {
  rpc GetNumbersStream(NumbersRequest) returns (stream NumberResponse);
}